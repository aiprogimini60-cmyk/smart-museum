<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqlli Muzey - Virtual Olim</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        #chat-box { height: 350px; overflow-y: auto; border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; text-align: left; background: #fafafa; border-radius: 8px;}
        .message { margin-bottom: 15px; padding: 10px; border-radius: 5px; line-height: 1.5;}
        .user-msg { background: #d1e7dd; align-self: flex-end; border-left: 4px solid #0f5132;}
        .ai-msg { background: #e2e3e5; border-left: 4px solid #41464b;}
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;}
        button { padding: 12px 25px; background: #0d6efd; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;}
        button:hover { background: #0b5ed7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ O'zbek-Xitoy Qo'shma Kafedrasi Muzeyi</h1>
        <p>Tan sulolasi san'ati va arxeologiyasi bo'yicha Virtual Olim bilan suhbatlashing</p>
        
        <div id="chat-box"></div>
        
        <div class="input-group">
            <input type="text" id="question" placeholder="Eksponat haqida savolingizni yozing...">
            <button onclick="askQuestion()">So'rash</button>
        </div>
    </div>

    <script>
        async function askQuestion() {
            const input = document.getElementById('question');
            const chatBox = document.getElementById('chat-box');
            const text = input.value.trim();
            
            if (!text) return;
            
            // Foydalanuvchi savolini chiqarish
            chatBox.innerHTML += `<div class="message user-msg"><b>Siz:</b> ${text}</div>`;
            input.value = '';
            
            // Kutish xabarini chiqarish
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div class="message ai-msg" id="${loadingId}"><i>⏳ Olim javob tayyorlamoqda...</i></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Serverga so'rov yuborish
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text, lang: 'uz' })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove(); // Kutish xabarini o'chirish
                
                if (data.error) throw new Error(data.error);
                
                // AI javobini chiqarish
                chatBox.innerHTML += `<div class="message ai-msg"><b>Virtual Olim:</b> ${data.answer}</div>`;
            } catch (err) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="message ai-msg" style="color:red;"><b>Xatolik yuz berdi:</b> ${err.message}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter bosilganda ham ishlaydigan qilish
        document.getElementById("question").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                askQuestion();
            }
        });
    </script>
</body>
</html>
