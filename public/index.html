<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'zbek-Xitoy Kafedrasi Muzeyi - Virtual Olim</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { 
            color: #f1c40f; 
        }
        /* 3D model joylashadigan oyna */
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: #1e1e1e;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .info-box, .chat-box {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        h2, h3 {
            color: #f1c40f;
            margin-top: 0;
        }
        button {
            background-color: #f1c40f;
            color: #121212;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #d4ac0d;
        }
    </script>
</head>
<body>

<div class="container">
    <h1>O'zbek-Xitoy Kafedrasi Muzeyi</h1>
    
    <model-viewer src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>

    <div class="info-box">
        <h2>Tan sulolasi san'ati (Namuna)</h2>
        <p>Bu matn shunchaki joy to'ldiruvchi sifatida yozilgan. Tan sulolasi (618–907) Xitoy tarixidagi eng gullab-yashnagan davrlardan biri bo'lib, uning san'ati, ayniqsa chinnilari va haykaltaroshligi butun dunyoga mashhur.</p>
    </div>

    <div class="chat-box">
        <h3>🤖 Virtual Olim bilan suhbat</h3>
        <p id="ai-javob">Muzeyimizga xush kelibsiz! Men sizning virtual yordamchiningizman.</p>
        <button onclick="gapir()">Ovozli javobni eshitish</button>
    </div>
</div>

<script>
    // Matnni ovoz chiqarib o'qish funksiyasi
    function gapir() {
        var matn = document.getElementById("ai-javob").innerText;
        var nutq = new SpeechSynthesisUtterance(matn);
        // Ovoz tilini sozlash
        nutq.lang = 'uz-UZ'; 
        window.speechSynthesis.speak(nutq);
    }
</script>

</body>
</html>
